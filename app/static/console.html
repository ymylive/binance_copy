<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=1440" />
  <title>korincoin 控制台</title>
  <link rel="stylesheet" href="/static/galaxy-tokens.css?v=v6-claude-grid" />
  <script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>
  <style>
    /* =====================================================================
       korincoin · Console
       Claude handdrawn light theme — maps the React app's existing
       class names onto galaxy-tokens.css palette without touching JSX.
       Source of truth for tokens:  galaxy-tokens.css
       Brand spec:                  _design/galaxy_live/brand-spec.md
       ===================================================================== */

    :root {
      /* Legacy aliases used by JSX inline style={} expressions. We keep the
         names so React code keeps working, but we re-point them at the
         galaxy palette so the page renders mint-light, not Apple-dark. */
      --bg:           var(--gq-bg);
      --surface-1:    var(--gq-fill-extra);
      --surface-2:    var(--gq-fill-light);
      --surface-3:    var(--gq-fill);
      --card:         var(--gq-card);
      --card-2:       var(--gq-card);

      --label:        var(--gq-text);
      --label-2:      var(--gq-text-2);
      --label-3:      var(--gq-text-3);
      --label-4:      var(--gq-text-4);

      /* JSX hardcodes these in style={{color:'var(--green)'}} / etc.
         Re-map them into galaxy mint / sell-side red / warn orange. */
      --blue:         var(--gq-mint);
      --blue-soft:    var(--gq-mint-soft);
      --green:        var(--gq-up);
      --green-soft:   var(--gq-up-soft);
      --red:          var(--gq-down);
      --red-soft:     var(--gq-down-soft);
      --orange:       var(--gq-warn);
      --orange-soft:  var(--gq-warn-soft);
      --yellow:       var(--gq-warn);
      --purple:       var(--gq-mint-3);
      --pink:         var(--gq-down);
      --teal:         var(--gq-mint-3);
      --indigo:       var(--gq-mint-2);

      --hairline:     var(--gq-line-3);
      --hairline-2:   var(--gq-line-2);

      --radius-xs:    2px;
      --radius-sm:    4px;
      --radius:       8px;
      --radius-lg:    12px;
      --radius-xl:    14px;

      --sans:         var(--gq-sans);
      --display:      var(--gq-sans);
      --mono:         var(--gq-mono);

      --t-fast:       150ms ease;
      --t-base:       220ms ease;

      --topbar-h:     60px;
      --side-w:       245px;
      --rail-w:       360px;
    }

    html, body, #root { height: 100%; margin: 0; padding: 0; }
    html {
      background: var(--gq-bg);
      color: var(--gq-text);
      font-family: var(--gq-sans);
      font-size: var(--gq-text-base);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    body {
      background: var(--gq-bg);
      overflow: hidden;
      position: relative;
    }
    *, *::before, *::after { box-sizing: border-box; }
    button {
      font: inherit; color: inherit; background: transparent;
      border: none; padding: 0; cursor: pointer;
    }
    button:focus-visible { outline: 2px solid var(--gq-mint-3); outline-offset: 2px; }
    input {
      font: inherit; color: inherit; background: transparent;
      border: none; padding: 0; outline: none;
    }
    input::placeholder { color: var(--gq-text-4); }
    ::selection { background: rgba(58,203,190,0.30); color: var(--gq-text); }
    *::-webkit-scrollbar { width: 8px; height: 8px; }
    *::-webkit-scrollbar-thumb { background: var(--gq-line-2); border-radius: 4px; }
    *::-webkit-scrollbar-thumb:hover { background: var(--gq-line); }
    *::-webkit-scrollbar-track { background: transparent; }

    code { font-family: var(--gq-mono); font-size: 12px;
           background: var(--gq-fill-light);
           padding: 1px 6px; border-radius: 3px; color: var(--gq-text); }

    /* ---------- shell ---------- */
    .app {
      display: grid;
      grid-template-rows: var(--topbar-h) 1fr;
      height: 100vh;
      background: var(--gq-bg);
    }

    /* ---------- topbar ---------- */
    .topbar {
      display: grid;
      grid-template-columns: var(--side-w) 1fr auto;
      align-items: center;
      gap: 16px;
      padding: 0 32px 0 16px;
      background: var(--gq-card);
      box-shadow: 0 1px 0 var(--gq-line-3);
      position: relative;
      z-index: 5;
    }
    .brand {
      display: flex; align-items: center; gap: 10px;
      padding: 0 8px;
    }
    .brand-mark {
      width: 32px; height: 32px;
      background: var(--gq-mint);
      border-radius: 50%;
      display: grid; place-items: center;
      color: #FFFFFF; font-weight: 600; font-size: 12px;
      letter-spacing: 0.02em;
      flex-shrink: 0;
    }
    .brand-name {
      font-family: var(--gq-display);
      font-weight: 600; font-size: 16px;
      letter-spacing: 0.04em;
      color: var(--gq-text);
    }
    .brand-sub {
      font-family: var(--gq-sans);
      font-size: 11px; font-weight: 400;
      letter-spacing: 0.04em;
      color: var(--gq-text-3);
      padding: 2px 8px;
      border-radius: var(--gq-radius-pill);
      background: var(--gq-fill-light);
      margin-left: 4px;
    }

    .topbar-search {
      max-width: 440px;
      display: flex; align-items: center; gap: 9px;
      height: 36px;
      padding: 0 14px;
      background: var(--gq-fill-light);
      border-radius: var(--gq-radius-sm);
      color: var(--gq-text-3);
      font-size: var(--gq-text-base);
      cursor: pointer;
      transition: background var(--t-fast), border-color var(--t-fast);
      border: 1px solid transparent;
    }
    .topbar-search:hover {
      background: var(--gq-card);
      border-color: var(--gq-line);
      color: var(--gq-text-2);
    }
    .topbar-search svg { width: 14px; height: 14px; opacity: 0.85; stroke: currentColor; fill: none; }
    .topbar-search .spacer { flex: 1; }
    .kbd {
      display: inline-flex; align-items: center; justify-content: center;
      min-width: 18px; height: 18px; padding: 0 5px;
      font-family: var(--gq-sans); font-size: 11px;
      color: var(--gq-text-2);
      background: var(--gq-card);
      border: 1px solid var(--gq-line-2);
      border-radius: 3px;
    }

    .topbar-right { display: flex; align-items: center; gap: 14px; }
    .topbar-metric {
      display: inline-flex; align-items: baseline; gap: 6px;
      font-family: var(--gq-sans); font-size: var(--gq-text-sm);
      color: var(--gq-text-3);
    }
    .topbar-metric .v {
      font-feature-settings: "tnum";
      color: var(--gq-text);
      font-weight: 500;
    }
    .topbar-metric .v.green { color: var(--gq-up); }
    .topbar-metric .v.warn  { color: var(--gq-warn); }
    .topbar-metric .sep { color: var(--gq-line); margin: 0 4px; }

    .icon-btn {
      width: 32px; height: 32px;
      display: grid; place-items: center;
      border-radius: var(--gq-radius-sm);
      color: var(--gq-mint-dark);
      transition: background var(--t-fast), color var(--t-fast);
    }
    .icon-btn:hover { background: var(--gq-mint-soft); color: var(--gq-mint-dark); }
    .icon-btn svg { width: 16px; height: 16px; stroke-width: 1.6; }

    /* ---------- main grid ---------- */
    .main {
      display: grid;
      grid-template-columns: var(--side-w) 1fr var(--rail-w);
      min-height: 0;
    }

    /* ---------- sidebar ---------- */
    .side {
      background: var(--gq-card);
      box-shadow: 1px 0 0 var(--gq-line-3);
      display: flex; flex-direction: column;
      padding: 16px 12px;
      gap: 24px;
      overflow: auto;
    }
    .side-section { display: flex; flex-direction: column; gap: 2px; }
    .side-label {
      font-family: var(--gq-sans);
      font-size: var(--gq-text-xs); font-weight: 400;
      color: var(--gq-text-3);
      letter-spacing: 0.04em;
      padding: 6px 12px 6px;
    }
    .side-row {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 14px;
      margin-bottom: 4px;
      border-radius: var(--gq-radius-menu);
      cursor: pointer;
      color: var(--gq-text);
      font-size: var(--gq-text-base);
      transition: background var(--t-fast), color var(--t-fast);
    }
    .side-row svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 1.6; flex-shrink: 0; opacity: 0.9; }
    .side-row .name { flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .side-row .meta {
      font-size: var(--gq-text-xs); color: var(--gq-text-3);
      font-feature-settings: "tnum";
    }
    .side-row:hover { background: var(--gq-mint-soft); color: var(--gq-mint-dark); }
    .side-row:hover .meta { color: var(--gq-mint-dark); }
    .side-row.active {
      background: var(--gq-mint);
      color: #FFFFFF;
    }
    .side-row.active .meta { color: rgba(255,255,255,0.85); }

    .acct-mark {
      width: 24px; height: 24px;
      border-radius: var(--gq-radius-sm);
      display: grid; place-items: center;
      font-size: var(--gq-text-xs); font-weight: 600;
      flex-shrink: 0;
      background: var(--gq-mint-soft);
      color: var(--gq-mint-dark);
    }
    .acct-mark.bin { background: var(--gq-warn-soft); color: var(--gq-warn); }
    .acct-mark.okx { background: var(--gq-mint-soft); color: var(--gq-mint-dark); }
    .side-row.active .acct-mark { background: rgba(255,255,255,0.20); color: #FFFFFF; }

    .alloc-strip {
      margin: 8px 12px 0;
      display: flex; flex-direction: column; gap: 6px;
    }
    .alloc-bar {
      height: 6px; border-radius: var(--gq-radius-pill);
      background: var(--gq-fill-light);
      overflow: hidden; display: flex;
    }
    .alloc-bar > div { height: 100%; }
    .alloc-line {
      font-family: var(--gq-sans); font-size: var(--gq-text-xs);
      color: var(--gq-text-3);
      display: flex; justify-content: space-between;
      font-feature-settings: "tnum";
    }

    /* ---------- center ---------- */
    .center {
      overflow: auto; min-height: 0;
      padding: 24px 32px 32px;
      background: var(--gq-bg);
    }
    .section-head {
      display: flex; justify-content: space-between; align-items: flex-end;
      gap: 24px; flex-wrap: wrap;
      padding: 0 4px 18px;
    }
    .section-head h1 {
      font-family: var(--gq-sans);
      font-size: var(--gq-text-xl); font-weight: 500;
      color: var(--gq-text);
      margin: 0;
      line-height: 1.2;
    }
    .section-head .sub {
      font-family: var(--gq-sans);
      font-size: var(--gq-text-sm);
      color: var(--gq-text-3);
      margin-top: 6px;
    }
    .section-head .sub .sep { color: var(--gq-line); margin: 0 6px; }
    .section-head .sub .green { color: var(--gq-up); }
    .section-head .sub .orange { color: var(--gq-warn); }

    /* segmented filter */
    .segment {
      display: inline-flex;
      background: var(--gq-card);
      border: 1px solid var(--gq-line-2);
      border-radius: var(--gq-radius-sm);
      padding: 2px;
      gap: 0;
    }
    .segment > button {
      padding: 5px 14px;
      font-size: var(--gq-text-sm); color: var(--gq-text-2);
      border-radius: 3px;
      transition: background var(--t-fast), color var(--t-fast);
    }
    .segment > button.active {
      background: var(--gq-mint);
      color: #FFFFFF;
      font-weight: 500;
    }
    .segment > button:not(.active):hover { color: var(--gq-mint-dark); background: var(--gq-mint-soft); }
    .segment .cnt {
      font-feature-settings: "tnum";
      color: var(--gq-text-3); margin-left: 6px;
    }
    .segment > button.active .cnt { color: rgba(255,255,255,0.80); }

    .head-actions { display: flex; gap: 10px; align-items: center; }

    .btn-primary {
      display: inline-flex; align-items: center; gap: 6px;
      height: 36px;
      padding: 0 16px;
      background: var(--gq-mint);
      color: #FFFFFF;
      border: 1px solid var(--gq-mint);
      font-size: var(--gq-text-base); font-weight: 500;
      border-radius: var(--gq-radius-sm);
      transition: background var(--t-fast), box-shadow var(--t-fast);
    }
    .btn-primary:hover { background: var(--gq-mint-dark); border-color: var(--gq-mint-dark); box-shadow: var(--gq-shadow-mint); }
    .btn-primary:active { transform: translateY(0.5px); }
    .btn-primary svg { width: 14px; height: 14px; stroke-width: 1.8; }
    .btn-primary:disabled { opacity: 0.45; cursor: not-allowed; background: var(--gq-mint); }

    /* ---------- channels ---------- */
    .channels-card {
      background: var(--gq-card);
      border-radius: var(--gq-radius);
      box-shadow: var(--gq-shadow-card);
      overflow: hidden;
    }
    .channel {
      display: grid;
      grid-template-columns: 44px 1fr auto;
      gap: 14px;
      align-items: center;
      padding: 16px 20px;
      cursor: pointer;
      transition: background var(--t-fast);
      position: relative;
      border-bottom: 1px solid var(--gq-line-3);
    }
    .channel:last-child { border-bottom: none; }
    .channel:hover { background: var(--gq-fill-light); }
    .channel.offline { opacity: 0.55; }
    .channel.offline:hover { opacity: 0.8; }

    .ch-avatar {
      width: 40px; height: 40px;
      display: grid; place-items: center;
      font-family: var(--gq-sans);
      font-weight: 600; font-size: 13px;
      letter-spacing: 0.02em;
      border-radius: 50%;
      color: #FFFFFF;
      position: relative;
      flex-shrink: 0;
    }
    /* avatar palette — flat mint-friendly hues, no gradients */
    .av-blue   { background: #3ACBBE; }
    .av-orange { background: #E6A23C; }
    .av-purple { background: #62DAD2; }
    .av-pink   { background: #EB4A61; }
    .av-green  { background: #23A599; }
    .av-teal   { background: #8BE3DD; color: var(--gq-mint-dark); }
    .av-indigo { background: #2E9992; }
    .av-gray   { background: #C0C4CC; }

    .ch-avatar .dot {
      position: absolute; bottom: -1px; right: -1px;
      width: 10px; height: 10px; border-radius: 50%;
      border: 2px solid var(--gq-card);
      z-index: 2;
    }
    .channel:hover .ch-avatar .dot { border-color: var(--gq-fill-light); }
    .dot.live  {
      background: var(--gq-up);
      box-shadow: 0 0 0 0 rgba(35,165,153,0.45);
      animation: pulse-mint 2s ease-out infinite;
    }
    .dot.stale {
      background: var(--gq-warn);
      box-shadow: 0 0 0 0 rgba(230,162,60,0.40);
      animation: pulse-warn 2.4s ease-out infinite;
    }
    .dot.off { background: var(--gq-text-4); }
    @keyframes pulse-mint {
      0%,100% { box-shadow: 0 0 0 0 rgba(35,165,153,0.45); }
      55%     { box-shadow: 0 0 0 5px rgba(35,165,153,0); }
    }
    @keyframes pulse-warn {
      0%,100% { box-shadow: 0 0 0 0 rgba(230,162,60,0.40); }
      55%     { box-shadow: 0 0 0 5px rgba(230,162,60,0); }
    }

    .ch-body {
      display: flex; flex-direction: column; gap: 2px;
      min-width: 0;
    }
    .ch-name {
      font-family: var(--gq-sans);
      font-size: var(--gq-text-md);
      font-weight: 600;
      color: var(--gq-text);
      display: flex; align-items: center; gap: 8px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .ch-stamp {
      font-family: var(--gq-sans);
      font-size: var(--gq-text-xs);
      font-weight: 500;
      padding: 1px 8px;
      border-radius: var(--gq-radius-xs);
    }
    .ch-stamp.stale { background: var(--gq-warn-soft); color: var(--gq-warn); }
    .ch-stamp.off   { background: var(--gq-fill-light); color: var(--gq-text-3); }

    .ch-sub {
      font-family: var(--gq-sans);
      font-size: var(--gq-text-sm);
      color: var(--gq-text-3);
      display: flex; align-items: center; gap: 5px;
      flex-wrap: wrap;
      font-feature-settings: "tnum";
    }
    .ch-sub .src { color: var(--gq-text-3); }
    .ch-sub .sep { color: var(--gq-line); margin: 0 1px; }

    .ch-acc {
      display: flex; flex-direction: column; align-items: flex-end;
      gap: 1px;
    }
    .ch-acc .v {
      font-family: var(--gq-sans);
      font-size: var(--gq-text-md);
      font-weight: 600;
      font-feature-settings: "tnum";
      color: var(--gq-text);
    }
    .ch-acc .v.green { color: var(--gq-up); }
    .ch-acc .v.warn  { color: var(--gq-warn); }
    .ch-acc .v.bad   { color: var(--gq-down); }
    .ch-acc .v.dim   { color: var(--gq-text-3); }
    .ch-acc .lbl {
      font-family: var(--gq-sans);
      font-size: var(--gq-text-xs);
      color: var(--gq-text-3);
    }

    /* ---------- right rail · signal feed ---------- */
    .rail {
      background: var(--gq-card);
      box-shadow: -1px 0 0 var(--gq-line-3);
      display: flex; flex-direction: column;
      min-height: 0;
    }
    .rail-head {
      padding: 18px 20px 14px;
      display: flex; align-items: baseline; justify-content: space-between;
      border-bottom: 1px solid var(--gq-line-3);
    }
    .rail-head h2 {
      font-family: var(--gq-sans);
      font-size: var(--gq-text-lg); font-weight: 500;
      color: var(--gq-text);
      margin: 0;
    }
    .rail-head .meta {
      font-size: var(--gq-text-xs); color: var(--gq-text-3);
      font-feature-settings: "tnum";
      margin-top: 4px;
    }
    .rail-actions { display: flex; gap: 4px; }
    .rail-list { flex: 1; overflow: auto; padding: 8px; }
    .signal {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 12px;
      padding: 11px 12px;
      border-radius: var(--gq-radius-sm);
      transition: background var(--t-fast);
      animation: signal-in var(--t-base);
    }
    @keyframes signal-in {
      from { opacity: 0; transform: translateY(-4px); background: var(--gq-mint-soft); }
      to   { opacity: 1; transform: none; }
    }
    .signal:hover { background: var(--gq-fill-light); }
    .signal.fail { background: var(--gq-down-soft); }
    .signal-avatar {
      width: 28px; height: 28px;
      border-radius: 50%;
      display: grid; place-items: center;
      font-size: 11px; font-weight: 600;
      color: #FFFFFF;
      flex-shrink: 0;
    }
    .signal-body {
      min-width: 0;
      display: flex; flex-direction: column; gap: 2px;
    }
    .signal-l1 {
      font-size: var(--gq-text-sm);
      color: var(--gq-text);
      display: flex; align-items: baseline; gap: 6px;
      flex-wrap: wrap;
    }
    .signal-l1 .lname { color: var(--gq-text); font-weight: 500; }
    .signal-l1 .verb  { color: var(--gq-text-2); }
    .signal-l1 .verb.add   { color: var(--gq-up); }
    .signal-l1 .verb.red   { color: var(--gq-warn); }
    .signal-l1 .verb.open  { color: var(--gq-mint-dark); }
    .signal-l1 .verb.close { color: var(--gq-down); }
    .signal-l1 .sym {
      font-family: var(--gq-mono); font-size: var(--gq-text-xs); font-weight: 500;
    }
    .signal-l1 .side-l { color: var(--gq-up); font-family: var(--gq-mono); font-size: var(--gq-text-xs); }
    .signal-l1 .side-s { color: var(--gq-down); font-family: var(--gq-mono); font-size: var(--gq-text-xs); }
    .signal-l1 .lev    { color: var(--gq-text-3); font-family: var(--gq-mono); font-size: var(--gq-text-xs); }
    .signal-l2 {
      font-size: var(--gq-text-xs); color: var(--gq-text-3);
      font-feature-settings: "tnum";
      display: flex; gap: 8px; align-items: baseline;
    }
    .signal-l2 .ok   { color: var(--gq-up); }
    .signal-l2 .skip { color: var(--gq-text-3); }
    .signal-l2 .fail { color: var(--gq-down); }
    .signal-time {
      font-family: var(--gq-sans);
      font-size: var(--gq-text-xs); color: var(--gq-text-3);
      align-self: flex-start;
      font-feature-settings: "tnum";
    }

    /* ---------- command palette ---------- */
    .palette-bg {
      position: fixed; inset: 0;
      background: rgba(52, 64, 84, 0.40);
      display: grid; place-items: start center;
      padding-top: 14vh;
      z-index: 50;
      animation: fade 140ms ease-out;
    }
    @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
    .palette {
      width: 580px; max-width: calc(100vw - 32px);
      background: var(--gq-card);
      border-radius: var(--gq-radius);
      box-shadow: var(--gq-shadow-hover);
      overflow: hidden;
      animation: pop 200ms ease-out;
    }
    @keyframes pop { from { transform: translateY(-6px) scale(0.98); opacity: 0; } to { transform: none; opacity: 1; } }

                      <tr key={p.symbol + ":" + p.position_side}>
                        <td>{p.symbol.replace("USDT","")}<span className="symquote">USDT</span></td>
                        <td className={`r ${p.position_side === "LONG" ? "side-l" : "side-s"}`}>{p.position_side}</td>
                        <td className="r">{fmt(p.leader_qty, Math.abs(p.leader_qty) < 1 ? 4 : 2)}</td>
                        <td className="r" style={{color:'var(--gq-text-3)'}}>{fmt(p.leader_notional_usd, 0)}</td>
                      </tr>
                    ))
                }
              </tbody>
            </table>
          </div>
          <div className="compare-card">
            <div className="compare-head">
              <span className="label r">我的跟单 · {leader.account_id || ACCOUNTS[0].name}</span>
              <span className="badge">{myPosCount} 持仓</span>
            </div>
            <table className="pos-table">
              <thead><tr><th>标的</th><th>方向</th><th>数量</th><th>Δ%</th><th>同步</th></tr></thead>
              <tbody>
                {syncLoading
                  ? <tr><td colSpan="5" style={{textAlign:'center',color:'var(--gq-text-3)',padding:14}}>— 加载中</td></tr>
                  : rows.length === 0
                    ? <tr><td colSpan="5" style={{textAlign:'center',color:'var(--gq-text-3)',padding:14}}>— 暂无跟单</td></tr>
                    : rows.map(p => {
                      const status = p.deviation_status || "ok";
                      const cls = status === "ok" ? "" : status === "drift" ? "diff" : "miss";
                      const color = status === "ok" ? "var(--gq-up)" : status === "drift" ? "var(--gq-warn)" : "var(--gq-down)";
                      const label = status === "ok" ? "in sync" : status;
                      return (
                        <tr key={p.symbol + ":" + p.position_side} className={cls}>
                          <td>{p.symbol.replace("USDT","")}<span className="symquote">USDT</span></td>
                          <td className={`r ${p.position_side === "LONG" ? "side-l" : "side-s"}`}>{Number(p.my_qty) !== 0 ? p.position_side : "—"}</td>
                          <td className="r">{Number(p.my_qty) !== 0 ? fmt(p.my_qty, Math.abs(p.my_qty) < 1 ? 4 : 2) : "—"}</td>
                          <td className="r" style={{color:'var(--gq-text-3)'}}>{p.deviation_pct == null ? "—" : p.deviation_pct.toFixed(2) + "%"}</td>
                          <td className="r" style={{color}}>{label}</td>
                        </tr>
                      );
                    })
                }
              </tbody>
            </table>
          </div>
        </div>

        <div className="deviation">
          <span className="label">当前跟单状态：<em style={{color: drift<0.01?"var(--gq-up)":drift<0.02?"var(--gq-warn)":"var(--gq-down)"}}>{drift<0.005?"完全同步":drift<0.01?"轻微偏离":"明显偏离"}</em></span>
          <span className="stat"><span className="k">drift</span>{(drift*100).toFixed(2)}%</span>
          {summary && <>
            <span className="stat"><span className="k">in sync</span>{summary.in_sync}</span>
            <span className="stat"><span className="k">drift rows</span>{summary.drift}</span>
            <span className="stat"><span className="k">missing</span>{summary.missing}</span>
            <span className="stat"><span className="k">extra</span>{summary.extra}</span>
          </>}
          <span className="stat"><span className="k">last synced</span>{leader.state === "offline" ? "—" : lastSynced}</span>
        </div>

        <div className="recent">
          <div className="recent-head">
            <span className="label">近期信号</span>
            <span className="meta">{leaderSignals.length} / {leader.signals_24h}</span>
          </div>
          <div style={{padding:'4px 8px 12px'}}>
            {leaderSignals.length === 0
              ? <div className="empty"><div className="hint">— 该交易员暂无信号</div></div>
              : leaderSignals.map(s => <SignalRow key={s.id} s={s} leader={leader}/>)
            }
          </div>
        </div>
      </div>
    );
  }

  function Palette({ open, setOpen, leaders, setSelected, setView, openImport }) {
    const [q, setQ] = useState("");
    const [sel, setSel] = useState(0);
    const ref = useRef(null);
    useEffect(() => {
      if (open) { setQ(""); setSel(0); setTimeout(()=>ref.current?.focus(), 30); }
    }, [open]);

    const items = useMemo(() => {
      const out = [];
      const ql = q.trim().toLowerCase();
      const cmds = [
        { name:"导入信号源…",       hint:":import",  action: openImport },
        { name:"暂停信号流",         hint:"P" },
        { name:"重放最近 20 条信号", hint:"R" },
        { name:"对比 leader…",       hint:":diff" },
        { name:"切换账户",            hint:":acct" },
      ].filter(c => !ql || c.name.toLowerCase().includes(ql) || c.hint.toLowerCase().includes(ql));
      out.push({ section:"命令", items: cmds });
      const lds = leaders.filter(l =>
        !ql || l.name.toLowerCase().includes(ql) || (l.source && l.source.includes(ql))
      ).map(l => ({
        name: l.name,
        hint: SOURCE_LABEL[l.source],
        action: () => { setSelected(l.id); setView("channels"); setOpen(false); },
      }));
      out.push({ section:"交易员", items: lds });
      return out.filter(g => g.items.length);
    }, [q, leaders]);

    const flat = items.flatMap(g => g.items);
    useEffect(() => {
      if (!open) return;
      const onKey = (e) => {
        if (e.key === "Escape") setOpen(false);
        else if (e.key === "ArrowDown") { e.preventDefault(); setSel(s => Math.min(flat.length-1, s+1)); }
        else if (e.key === "ArrowUp")   { e.preventDefault(); setSel(s => Math.max(0, s-1)); }
        else if (e.key === "Enter")     { e.preventDefault(); flat[sel]?.action?.(); }
      };
      window.addEventListener("keydown", onKey);
      return () => window.removeEventListener("keydown", onKey);
    }, [open, flat, sel, setOpen]);

    if (!open) return null;
    let idx = -1;
    return (
      <div className="palette-bg" onClick={()=>setOpen(false)}>
        <div className="palette" onClick={e=>e.stopPropagation()}>
          <div className="palette-input">
            <I.Search/>
            <input ref={ref} value={q} onChange={e=>setQ(e.target.value)}
                   placeholder="搜索 leader / 执行命令…"/>
            <span className="kbd">esc</span>
          </div>
          <div className="palette-list">
            {items.length === 0
              ? <div className="empty"><div className="hint">— 没有匹配项</div></div>
              : items.map(g => (
                <div key={g.section}>
                  <div className="palette-section">{g.section}</div>
                  {g.items.map((it, i) => {
                    idx++; const me = idx;
                    return (
                      <div key={i} className={`palette-item ${me===sel?"sel":""}`}
                           onMouseEnter={()=>setSel(me)}
                           onClick={()=>it.action?.()}>
                        <span className="icon-slot">
                          {g.section === "交易员" ? <I.Channel/> : <I.Bolt/>}
                        </span>
                        <span className="pname">{it.name}</span>
                        <span className="phint">{it.hint}</span>
                      </div>
                    );
                  })}
                </div>
              ))
            }
          </div>
          <div className="palette-foot">
            <span><span className="kbd">↑</span> <span className="kbd">↓</span> 选择</span>
            <span><span className="kbd">↵</span> 确认</span>
            <span><span className="kbd">esc</span> 关闭</span>
            <span style={{marginLeft:'auto'}}>{flat.length} 项</span>
          </div>
        </div>
      </div>
    );
  }

  function Pending({ title, hint }) {
    return (
      <div className="empty">
        <span className="pending">敬请期待</span>
        <div className="title">{title}</div>
        <div className="hint">{hint}</div>
      </div>
    );
  }

  /* ---- App ---- */
  function TokenModal({ open, setOpen, dismissable }) {
    const [val, setVal] = useState("");
    const inputRef = useRef(null);

    useEffect(() => {
      if (!open) return;
      setVal(getToken());
      const t = setTimeout(() => inputRef.current && inputRef.current.focus(), 80);
      return () => clearTimeout(t);
    }, [open]);

    if (!open) return null;
    const trimmed = (val || "").trim();
    const canConnect = trimmed.length > 0;

    const onConnect = () => {
      if (!canConnect) return;
      setToken(trimmed);
      setOpen(false);
    };

    const onClear = () => {
      setToken("");
      setVal("");
    };

    return (
      <div className="modal-bg" onClick={() => { if (dismissable) setOpen(false); }}>
        <div className="modal" onClick={(e) => e.stopPropagation()}>
          <div className="modal-head">
            <h3>连接到你的 korincoin 服务器</h3>
            <div className="sub">粘贴服务器首次启动 stdout 中的 API token，或从服务器上的 <code>runtime/api_token.txt</code> 文件读取。</div>
          </div>
          <div className="modal-body token-body">
            <input
              ref={inputRef}
              type="password"
              className="token-input"
              placeholder="在此粘贴 token"
              value={val}
              onChange={(e) => setVal(e.target.value)}
              onKeyDown={(e) => { if (e.key === "Enter") onConnect(); }}
              autoComplete="off"
              spellCheck={false}
            />
          </div>
          <div className="modal-foot">
            <button className="link-btn" onClick={onClear} disabled={!getToken() && !val} title="清除已存 token">
              清除
            </button>
            <button className="link-btn" onClick={() => setOpen(false)} disabled={!dismissable}>
              取消
            </button>
            <button className="btn-primary" onClick={onConnect} disabled={!canConnect}>
              连接
            </button>
          </div>
        </div>
      </div>
    );
  }

  function App() {
    const [activeAccount, setActiveAccount] = useState("BIN-ALPHA");
    const [view, setView]                   = useState("channels");
    const [filter, setFilter]               = useState("all");
    const [selected, setSelected]           = useState(null);
    const [paused, setPaused]               = useState(false);
    const [paletteOpen, setPaletteOpen]     = useState(false);
    const [importOpen, setImportOpen]       = useState(false);
    const [signals, setSignals]             = useState([]);
    const [leaders, setLeaders]              = useState([]);
    const [health, setHealth]                = useState(null);
    const [loading, setLoading]              = useState(true);
    const [bootError, setBootError]          = useState(null);
    const [usingFallback, setUsingFallback]  = useState(false);
    const [tokenModalOpen, setTokenModalOpen] = useState(false);
    const [hasToken, setHasToken]            = useState(() => !!getToken());
    const leadersById = useMemo(()=>Object.fromEntries(leaders.map(l=>[l.id,l])),[leaders]);

    // boot fetch — leaders / signals / health in parallel
    useEffect(() => {
      if (!getToken()) {
        setTokenModalOpen(true);
        setLoading(false);
        return;
      }
      let cancelled = false;
      (async () => {
        try {
          const [leadersData, signalsData, healthData] = await Promise.all([
            api("/api/leaders"),
            api("/api/signals?limit=80"),
            api("/api/health/poller"),
          ]);
          if (cancelled) return;
          setLeaders(Array.isArray(leadersData) ? leadersData.map(adaptLeader) : []);
          setSignals(Array.isArray(signalsData) ? signalsData.map(adaptSignal) : []);
          setHealth(healthData || null);
          setBootError(null);
          setUsingFallback(false);
          setLoading(false);
        } catch (err) {
          if (cancelled) return;
          if (err.code === 401) {
            setTokenModalOpen(true);
            setBootError("auth");
          } else {
            console.warn("[copy-sync] boot fetch failed, using fallback mock:", err);
            setBootError(err.message || "unknown");
            // surface mock so UI is still navigable
            setLeaders(FALLBACK_LEADERS.map(l => ({ ...l, positions_count: l.positions.length })));
            const histAdapted = FALLBACK_HISTORY.map((s,i)=>({ ...s, id: s.id || ("sig_fb_" + i) }));
            setSignals(histAdapted);
            setUsingFallback(true);
          }
          setLoading(false);
        }
      })();
      return () => { cancelled = true; };
    }, [hasToken]);

    // keep hasToken in sync with the modal
    useEffect(() => {
      if (!tokenModalOpen) setHasToken(!!getToken());
    }, [tokenModalOpen]);

    // SSE realtime — replaces the old mock setInterval generator
    useEffect(() => {
      if (paused || !getToken() || usingFallback) return;
      const url = `/api/signals/stream?token=${encodeURIComponent(getToken())}`;
      let es;
      try { es = new EventSource(url); }
      catch (e) { console.warn("[copy-sync] EventSource ctor failed:", e); return; }
      const onSignal = (e) => {
        try {
          const sig = JSON.parse(e.data);
          setSignals(prev => {
            const adapted = adaptSignal(sig);
            // dedupe by id (server may resend on reconnect)
            const filtered = prev.filter(p => p.id !== adapted.id);
            return [adapted, ...filtered].slice(0, 80);
          });
        } catch (err) {
          console.warn("[copy-sync] bad SSE payload:", err);
        }
      };
      es.addEventListener("signal", onSignal);
      es.onerror = () => {
        // EventSource auto-reconnects; only log
        console.warn("[copy-sync] SSE error, browser will retry");
      };
      return () => { es.removeEventListener("signal", onSignal); es.close(); };
    }, [paused, hasToken, usingFallback]);

    // banner copy
    let errorBanner = null;
    if (bootError === "auth") {
      errorBanner = "会话已过期，请点击设置更新 token。";
    } else if (bootError) {
      errorBanner = `后端不可达：${bootError}。当前显示缓存数据。`;
    }

    useEffect(() => {
      const onKey = (e) => {
        if ((e.key === "k" || e.key === "K") && (e.metaKey || e.ctrlKey)) {
          e.preventDefault();
          setPaletteOpen(o => !o);
        } else if (e.key === "Escape" && selected) {
          setSelected(null);
        }
      };
      window.addEventListener("keydown", onKey);
      return () => window.removeEventListener("keydown", onKey);
    }, [selected]);

    const leader = selected ? leaders.find(l => l.id === selected) : null;

    return (
      <div className="app">
        <Topbar openPalette={()=>setPaletteOpen(true)}
                leaders={leaders} signals={signals} health={health}
                openTokenModal={()=>setTokenModalOpen(true)}/>
        {errorBanner && <div className="api-banner">{errorBanner}</div>}
        <div className="main">
          <Sidebar activeAccount={activeAccount} setActiveAccount={setActiveAccount}
                   view={view} setView={setView} leaders={leaders}/>
          <main className="center">
            {view === "channels" && (
              leader ? <Detail leader={leader} signals={signals} onBack={()=>setSelected(null)}/>
                     : <ChannelsView leaders={leaders} setSelected={setSelected}
                                     filter={filter} setFilter={setFilter}
                                     openImport={()=>setImportOpen(true)}/>
            )}
            {view === "live" && <Pending title="实时信号" hint="全屏信号终端 · 敬请期待"/>}
            {view === "history" && <Pending title="历史记录" hint="时间区间检索 · 敬请期待"/>}
            {view === "okx" && <Pending title="OKX 带单" hint="OKX 带单子页面 · 敬请期待"/>}
            {view === "config" && <Pending title="配置" hint="API token · 账户 · 资金分配 · 敬请期待"/>}
          </main>
          <Rail signals={signals} paused={paused} setPaused={setPaused} leadersById={leadersById}/>
        </div>
        <Palette open={paletteOpen} setOpen={setPaletteOpen}
                 leaders={leaders} setSelected={setSelected} setView={setView}
                 openImport={()=>{ setPaletteOpen(false); setImportOpen(true); }}/>
        <ImportModal open={importOpen} setOpen={setImportOpen}/>
        <TokenModal open={tokenModalOpen} setOpen={setTokenModalOpen} dismissable={hasToken}/>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
